<style>
  :root {

  }
  @media (prefers-color-scheme: light) {
    :root {

      --text: #1b1f27; --muted: #5b6675; --accent: #2f6df6; --chip: #eef1f5;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  header { padding: 20px 24px 8px; }
  .title { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; }
  .sub a { color: var(--accent); }
  .gaps { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 24px 0; }
  .gap { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 12px; font-size: 12px; color: var(--muted); }
  .gap b { color: var(--text); display: block; font-size: 13px; }
  .gap .delta { font-weight: 700; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 14px 24px 4px; }
  .toolbar input[type=search] { background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 7px 10px; border-radius: 8px; min-width: 220px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px 24px; }
  .chips .label { color: var(--muted); font-size: 12px; align-self: center; margin-right: 2px; }
  .chip { background: var(--chip); border: 1px solid var(--border); color: var(--muted);
    padding: 4px 10px; border-radius: 999px; cursor: pointer; font-size: 12px; }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  main { padding: 8px 24px 40px; overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; background: var(--panel);
    border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
  th { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em;
    cursor: pointer; user-select: none; white-space: nowrap; background: var(--panel-2); }
  th.sorted { color: var(--accent); }
  tr.row { cursor: pointer; }
  tr.row:hover { background: var(--panel-2); }
  td.num { font-family: ui-monospace, monospace; text-align: right; }
  .way { font-size: 11px; color: var(--accent); background: var(--chip); padding: 1px 7px; border-radius: 6px; }
  .flag { font-size: 11px; padding: 1px 7px; border-radius: 6px; background: var(--chip);
    color: var(--warn); border: 1px solid var(--border); margin-right: 4px; white-space: nowrap; }
  .flag.hard { color: var(--bad); }
  .verdict { font-weight: 600; }
  .verdict.keep { color: var(--good); } .verdict.watch { color: var(--warn); } .verdict.fix { color: var(--bad); }
  .pos { color: var(--good); } .neg { color: var(--bad); }
  tr.detail td { background: var(--panel-2); padding: 12px 16px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 800px) { .detail-grid { grid-template-columns: 1fr; } }
  pre { background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px; font-size: 12px; overflow-x: auto; margin: 6px 0 0; }
  .cohorts { width: 100%; font-size: 12px; }
  .cohorts th { font-size: 11px; padding: 4px 8px; cursor: default; }
  .cohorts td { padding: 4px 8px; }
  .muted { color: var(--muted); }
</style>
</head>

const S = AUDIT_SNAPSHOT;
if (!S) document.body.innerHTML = "<p style='padding:24px'>No snapshot baked — run <code>npm run sim && npm run audit</code>.</p>";

const pct = v => (v === null || v === undefined) ? "—" : (v * 100).toFixed(0) + "%";
const spct = v => v === null ? "—" : (v > 0 ? "+" : "") + (v * 100).toFixed(0) + "%";
const esc = s => String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

const COLS = [
  { key: "name", label: "Card", v: r => esc(r.name) },
  { key: "way", label: "Way", v: r => esc(r.way) },
  { key: "band", label: "Band", v: r => `${esc(r.band)} · m${r.mark} · wd${r.wd}` },
  { key: "role", label: "Role", v: r => esc(r.role) + (r.capstone ? " ★" : "") },
  { key: "winRelevance", label: "Win-relevance", v: r => esc(r.winRelevance) },
  { key: "playShare", label: "Play share", num: true, v: r => pct(r.harness.playShare), s: r => r.harness.playShare },
  { key: "playRate", label: "Play rate", num: true, v: r => pct(r.harness.playRate), s: r => r.harness.playRate },
  { key: "winDelta", label: "Win Δ", num: true, s: r => r.harness.winDelta,
    v: r => r.harness.winDelta === null ? "<span class='muted'>—</span>"
      : `<span class="${r.harness.winDelta > 0 ? "pos" : "neg"}">${spct(r.harness.winDelta)}</span> <span class="muted">${esc(r.harness.winDeltaCohort)}</span>` },
  { key: "fill", label: "Fill", num: true, v: r => r.harness.fill, s: r => r.harness.fill },
  { key: "xfill", label: "Exploit fill", num: true, v: r => pct(r.harness.exploitFillShare), s: r => r.harness.exploitFillShare },
  { key: "flags", label: "Flags", s: r => r.flags.length, v: r => r.flags.map(f =>
      `<span class="flag${/R14|R15|R2·|R3·|R6·/.test(f) ? " hard" : ""}">${esc(f)}</span>`).join("") },
  { key: "verdict", label: "Verdict (suggested)",
    s: r => (r.verdict.startsWith("fix") ? 0 : r.verdict.startsWith("watch") ? 1 : 2),
    v: r =>
      `<span class="verdict ${r.verdict.startsWith("fix") ? "fix" : r.verdict.startsWith("watch") ? "watch" : "keep"}">${esc(r.verdict)}</span>` },
];

const state = { way: "all", flag: "all", verdict: "all", q: "", sortKey: "playShare", sortDir: -1, open: null };

function chipRow(el, values, key) {
  for (const v of values) {
    const c = document.createElement("span");
    c.className = "chip" + (state[key] === v ? " active" : "");
    c.textContent = v;
    c.onclick = () => { state[key] = v; state.open = null; render(); };
    el.appendChild(c);
  }
}

function filtered() {
  const col = COLS.find(c => c.key === state.sortKey);
  return S.rows.filter(r =>
    (state.way === "all" || r.way === state.way) &&
    (state.flag === "all" || (state.flag === "any" ? r.flags.length > 0 : r.flags.some(f => f.startsWith(state.flag)))) &&
    (state.verdict === "all" || r.verdict.startsWith(state.verdict)) &&
    (state.q === "" || (r.name + " " + r.id).toLowerCase().includes(state.q)))
  .sort((a, b) => {
    const va = col.s ? col.s(a) : col.v(a), vb = col.s ? col.s(b) : col.v(b);
    if (va == null || vb == null) return (va == null) - (vb == null);   // no-data rows sort last, either direction
    return (typeof va === "number" ? va - vb : String(va).localeCompare(String(vb))) * state.sortDir;
  });
}

function detailHtml(r) {
  const cohortRows = r.cohorts.map(k => `<tr>
    <td>${esc(k.archetype)}</td><td>${esc(k.policy)}</td><td class="num">${k.runsPresent}</td>
    <td class="num">${k.played}</td><td class="num">${pct(k.playShare)}</td><td class="num">${k.fill}</td>
    <td class="num">${k.winDelta === null ? "—" : spct(k.winDelta) + (k.lowConfidence ? " ?" : "")}</td>
    <td>${k.flags.join(", ") || "—"}</td></tr>`).join("");
  return `<div class="detail-grid">
    <div><b>Effects</b> <span class="muted">(currencies: ${r.currencies.join(", ") || "none"})</span>
      <pre>${esc(JSON.stringify(r.effects, null, 1))}</pre></div>
    <div><b>Cohorts</b> <span class="muted">(win Δ marked ? = thin exposure)</span>
      <table class="cohorts"><tr><th>cohort</th><th>policy</th><th>present</th><th>played</th>
      <th>share</th><th>fill</th><th>win Δ</th><th>flags</th></tr>${cohortRows}</table></div>
  </div>`;
}

function render() {
  document.getElementById("baked").textContent = S.baked + ` · ${S.runsPerCohort} runs/cohort`;
  const gaps = document.getElementById("gaps");
  gaps.innerHTML = "";
  for (const a of S.byArchetype) {
    const gap = (a.exploitWins - a.wins) / a.runs;
    const el = document.createElement("div");
    el.className = "gap";
    el.innerHTML = `<b>${esc(a.archetype)}</b> way ${a.wins}/${a.runs} · exploit ${a.exploitWins}/${a.runs}
      · <span class="delta ${gap > 0.1 ? "neg" : "muted"}">gap ${spct(gap)}</span>`;
    gaps.appendChild(el);
  }
  for (const [id, key, vals] of [
    ["wayChips", "way", ["all", ...new Set(S.rows.map(r => r.way))]],
    ["flagChips", "flag", ["all", "any", "R14", "R15", "R2", "R3", "R4", "R6", "R9", "H·", "X·"]],
    ["verdictChips", "verdict", ["all", "keep", "watch", "fix"]],
  ]) {
    const el = document.getElementById(id);
    el.querySelectorAll(".chip").forEach(c => c.remove());
    chipRow(el, vals, key);
  }
  const rows = filtered();
  document.getElementById("counts").textContent =
    `${S.rows.length} cards · ${S.rows.filter(r => r.flags.length).length} flagged · showing ${rows.length}`;
  document.getElementById("thead").innerHTML = "<tr>" + COLS.map(c =>
    `<th class="${state.sortKey === c.key ? "sorted" : ""}" data-k="${c.key}">${c.label}${state.sortKey === c.key ? (state.sortDir < 0 ? " ↓" : " ↑") : ""}</th>`).join("") + "</tr>";
  document.getElementById("tbody").innerHTML = rows.map(r =>
    `<tr class="row" data-id="${esc(r.id)}">` + COLS.map(c => `<td class="${c.num ? "num" : ""}">${c.v(r)}</td>`).join("") + "</tr>" +
    (state.open === r.id ? `<tr class="detail"><td colspan="${COLS.length}">${detailHtml(r)}</td></tr>` : "")).join("");
  document.querySelectorAll("#thead th").forEach(th => th.onclick = () => {
    const k = th.dataset.k;
    if (state.sortKey === k) state.sortDir *= -1; else { state.sortKey = k; state.sortDir = -1; }
    render();
  });
  document.querySelectorAll("#tbody tr.row").forEach(tr => tr.onclick = () => {
    state.open = state.open === tr.dataset.id ? null : tr.dataset.id;
    render();
  });
}

if (S) {
  document.getElementById("search").oninput = e => { state.q = e.target.value.toLowerCase(); render(); };
  render();
}
</script>
