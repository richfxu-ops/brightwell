<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Task Dashboard</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel-2: #1e222b; --border: #2a2f3a;
    --text: #e6e8ec; --muted: #9aa3b2; --accent: #5b9dff;
    --p0: #ff5d5d; --p1: #ff9f43; --p2: #5b9dff; --p3: #7a8190;
    --done: #34c759; --chip: #232833;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f6f7f9; --panel: #ffffff; --panel-2: #f0f2f5; --border: #e2e6ec;
      --text: #1b1f27; --muted: #5b6675; --accent: #2f6df6; --chip: #eef1f5;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  header { padding: 20px 24px 12px; }
  .title { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 8px 24px 4px; }
  .toolbar input[type=search] { background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 7px 10px; border-radius: 8px; min-width: 200px; }
  button { background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 7px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
  button:hover { border-color: var(--accent); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 24px; }
  .chip { background: var(--chip); border: 1px solid var(--border); color: var(--muted);
    padding: 4px 10px; border-radius: 999px; cursor: pointer; font-size: 12px; }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .progress-wrap { padding: 4px 24px 12px; }
  .bar { height: 10px; background: var(--panel-2); border-radius: 999px; overflow: hidden; border: 1px solid var(--border); }
  .bar > span { display: block; height: 100%; background: var(--done); width: 0; transition: width .4s ease; }
  .stats { display: flex; gap: 18px; flex-wrap: wrap; color: var(--muted); font-size: 13px; margin-top: 8px; }
  .stats b { color: var(--text); }
  .board { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(260px, 1fr);
    gap: 14px; padding: 8px 24px 32px; overflow-x: auto; align-items: start; }
  .col { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
  .col h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted);
    margin: 2px 4px 12px; display: flex; justify-content: space-between; }
  .col h2 .count { background: var(--panel-2); border-radius: 999px; padding: 1px 8px; font-size: 12px; }
  .card { background: var(--panel-2); border: 1px solid var(--border); border-left: 3px solid var(--p3);
    border-radius: 9px; padding: 10px 12px; margin-bottom: 9px; }
  .card.p0 { border-left-color: var(--p0); } .card.p1 { border-left-color: var(--p1); }
  .card.p2 { border-left-color: var(--p2); } .card.p3 { border-left-color: var(--p3); }
  .card.done .ttl { text-decoration: line-through; color: var(--muted); }
  .card .ttl { font-size: 14px; }
  .card .ttl a { color: inherit; text-decoration: underline dotted; text-underline-offset: 3px; }
  .card .ttl a:hover { text-decoration: underline; }
  .card .meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; align-items: center; }
  .badge { font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 6px; color: #fff; }
  .badge.p0 { background: var(--p0); } .badge.p1 { background: var(--p1); }
  .badge.p2 { background: var(--p2); } .badge.p3 { background: var(--p3); }
  .tag { font-size: 11px; color: var(--accent); background: var(--chip); padding: 1px 7px; border-radius: 6px; }
  .id { font-size: 11px; color: var(--muted); font-family: ui-monospace, monospace; }
  .empty { color: var(--muted); font-size: 13px; padding: 6px 4px; }
  .notice { margin: 24px; padding: 16px 18px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; color: var(--muted); }
  .notice code { background: var(--panel-2); padding: 1px 6px; border-radius: 5px; color: var(--text); }
  .notice b { color: var(--text); }
  .state { font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 6px; border: 1px solid; }
  .state.ready { color: var(--done); border-color: var(--done); }
  .state.blocked { color: var(--p0); border-color: var(--p0); }
  .card.clickable { cursor: pointer; }
  .card.clickable:hover { border-color: var(--accent); }
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; }
  #overlay.open { display: block; }
  #drawer { position: fixed; top: 0; right: 0; bottom: 0; width: min(560px, 92vw); background: var(--panel);
    border-left: 1px solid var(--border); display: none; flex-direction: column;
    box-shadow: -12px 0 32px rgba(0,0,0,.35); }
  #drawer.open { display: flex; }
  .dhead { display: flex; align-items: start; justify-content: space-between; gap: 10px;
    padding: 16px 18px 10px; border-bottom: 1px solid var(--border); }
  .dhead .ttl { font-size: 17px; font-weight: 700; }
  .dmeta { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 18px 0; }
  .dbody { padding: 4px 18px 24px; overflow-y: auto; }
  .dbody h2 { font-size: 15px; margin: 18px 0 6px; }
  .dbody h3, .dbody h4 { font-size: 13px; margin: 14px 0 4px; }
  .dbody p { margin: 8px 0; }
  .dbody ul { margin: 6px 0; padding-left: 22px; }
  .dbody li { margin: 3px 0; list-style: none; margin-left: -8px; }
  .dbody code { background: var(--panel-2); padding: 1px 5px; border-radius: 5px; font-size: 12.5px; }
  .dbody pre { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; overflow-x: auto; }
  .dbody pre code { background: none; padding: 0; }
  .dbody a { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1 class="title" id="proj">Task Dashboard</h1>
  <div class="sub" id="updated">Reading TASKS.md…</div>
</header>

<div class="toolbar">
  <input type="search" id="search" placeholder="Search tasks…" />
  <button id="reload">↻ Reload</button>
  <button id="pickbtn">Load TASKS.md…</button>
  <input type="file" id="picker" accept=".md,text/markdown,text/plain" style="display:none" />
  <button id="clearfilters">Clear filters</button>
</div>
<div class="chips" id="chips"></div>

<div class="progress-wrap">
  <div class="bar"><span id="barfill"></span></div>
  <div class="stats" id="stats"></div>
</div>

<div id="content"></div>

<div id="overlay"></div>
<aside id="drawer" role="dialog" aria-modal="true">
  <div class="dhead"><div class="ttl" id="dttl"></div><button id="dclose" aria-label="Close">✕</button></div>
  <div class="dmeta" id="dmeta"></div>
  <div class="dbody" id="dbody"></div>
</aside>

<script>
const STANDARD = ["Backlog", "Next", "In Progress", "Done"];
let STATE = { columns: [], title: "Task Dashboard", selectedTags: new Set(), search: "" };

// ---- task-file details, fetched from the board's [Title](tasks/x.md) links ----
// Enables the Ready/Blocked badges (from `blocked-by:` frontmatter) and the
// click-through detail drawer. Needs the folder to be served over HTTP; in
// file-picker mode these fetches fail per-file and the board still renders.
let FILES = {}; // stem -> { ok, status, size, blockedBy, body }

function stemOf(link) { return (link || "").split("/").pop().replace(/\.md$/i, ""); }

function parseFrontmatter(md) {
  const m = md.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?/);
  if (!m) return { meta: {}, body: md };
  const meta = {};
  m[1].split(/\r?\n/).forEach(l => {
    const kv = l.match(/^([\w-]+):\s*(.*)$/);
    if (kv) meta[kv[1].toLowerCase()] = kv[2].trim();
  });
  return { meta, body: md.slice(m[0].length) };
}

async function fetchTaskFiles() {
  FILES = {};
  const links = new Set();
  STATE.columns.forEach(c => c.tasks.forEach(t => { if (t.link && /\.md$/i.test(t.link)) links.add(t.link); }));
  await Promise.all([...links].map(async link => {
    try {
      const res = await fetch(link, { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const { meta, body } = parseFrontmatter(await res.text());
      FILES[stemOf(link)] = {
        ok: true,
        status: (meta.status || "").toLowerCase(),
        size: meta.size || null,
        blockedBy: (meta["blocked-by"] || "").split(/[\s,]+/).filter(Boolean),
        body,
      };
    } catch { FILES[stemOf(link)] = { ok: false }; }
  }));
}

// A blocker counts as complete via its file status or its board checkbox;
// unknown stems are ignored rather than blocking forever on a typo.
function boardDone(stem) {
  for (const c of STATE.columns) for (const t of c.tasks)
    if (t.link && stemOf(t.link) === stem) return t.done;
  return undefined;
}
function blockerOpen(stem) {
  const f = FILES[stem], onBoard = boardDone(stem);
  if (!f && onBoard === undefined) return false;
  return !((f && f.ok && f.status === "complete") || onBoard === true);
}
function stateBadge(t) {
  if (t.done || !t.link) return "";
  const f = FILES[stemOf(t.link)];
  if (!f || !f.ok) return "";
  const open = (f.blockedBy || []).filter(blockerOpen);
  if (open.length) return `<span class="state blocked" title="waiting on: ${escapeHtml(open.join(", "))}">Blocked</span>`;
  if (!f.status || f.status === "to do") return `<span class="state ready">Ready</span>`;
  return "";
}

function parseTasks(md) {
  const lines = md.split(/\r?\n/);
  let title = "Task Dashboard";
  const columns = [];
  let cur = null;
  const titleMatch = md.match(/^#\s+(.+?)\s*$/m);
  if (titleMatch) title = titleMatch[1];

  for (const line of lines) {
    const h2 = line.match(/^##\s+(.+?)\s*$/);
    if (h2) { cur = { name: h2[1].trim(), tasks: [] }; columns.push(cur); continue; }
    const t = line.match(/^\s*[-*]\s*\[([ xX~])\]\s*(.+?)\s*$/);
    if (t && cur) {
      let text = t[2];
      const checked = /[xX]/.test(t[1]);
      const colDone = cur.name.toLowerCase() === "done";
      const linkM = text.match(/\[([^\]]+)\]\(([^)\s]+)\)/);
      const link = linkM ? linkM[2] : null;
      if (linkM) text = text.replace(linkM[0], linkM[1]);
      const priM = text.match(/\((P[0-3])\)/i);
      const priority = priM ? priM[1].toUpperCase() : null;
      const tags = [...text.matchAll(/#([\w-]+)/g)].map(m => m[1]);
      const idM = text.match(/^([A-Za-z]{1,6}\d+|\d+\.)\s+/);
      const id = idM ? idM[1] : null;
      let ttl = text
        .replace(/\((P[0-3])\)/i, "")
        .replace(/#[\w-]+/g, "")
        .replace(/^([A-Za-z]{1,6}\d+|\d+\.)\s+/, "")
        .replace(/\s{2,}/g, " ").trim();
      cur.tasks.push({ title: ttl || text.trim(), done: checked || colDone, priority, tags, id, link });
    }
  }
  return { title, columns };
}

function orderColumns(columns) {
  const byName = {}; columns.forEach(c => byName[c.name.toLowerCase()] = c);
  const ordered = [];
  STANDARD.forEach(n => { const c = byName[n.toLowerCase()]; if (c) { ordered.push(c); delete byName[n.toLowerCase()]; } });
  columns.forEach(c => { if (byName[c.name.toLowerCase()]) ordered.push(c); });
  return ordered;
}

function allTags(columns) {
  const s = new Set();
  columns.forEach(c => c.tasks.forEach(t => t.tags.forEach(tag => s.add(tag))));
  return [...s].sort();
}

function visible(task) {
  const { selectedTags, search } = STATE;
  if (selectedTags.size && !task.tags.some(t => selectedTags.has(t))) return false;
  if (search && !task.title.toLowerCase().includes(search.toLowerCase())) return false;
  return true;
}

function render() {
  const columns = orderColumns(STATE.columns);
  document.getElementById("proj").textContent = STATE.title;

  let total = 0, done = 0;
  STATE.columns.forEach(c => c.tasks.forEach(t => { total++; if (t.done) done++; }));
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById("barfill").style.width = pct + "%";
  const open = total - done;
  document.getElementById("stats").innerHTML =
    `<span><b>${pct}%</b> complete</span><span><b>${open}</b> open</span>` +
    `<span><b>${done}</b> done</span><span><b>${total}</b> total</span>`;

  // chips
  const chipBox = document.getElementById("chips");
  chipBox.innerHTML = "";
  allTags(STATE.columns).forEach(tag => {
    const el = document.createElement("span");
    el.className = "chip" + (STATE.selectedTags.has(tag) ? " active" : "");
    el.textContent = "#" + tag;
    el.onclick = () => { STATE.selectedTags.has(tag) ? STATE.selectedTags.delete(tag) : STATE.selectedTags.add(tag); render(); };
    chipBox.appendChild(el);
  });

  // board
  const board = document.createElement("div");
  board.className = "board";
  columns.forEach(col => {
    const shown = col.tasks.filter(visible);
    const c = document.createElement("div");
    c.className = "col";
    c.innerHTML = `<h2>${escapeHtml(col.name)} <span class="count">${shown.length}</span></h2>`;
    if (!shown.length) {
      const e = document.createElement("div"); e.className = "empty"; e.textContent = "—"; c.appendChild(e);
    }
    shown.forEach(t => {
      const card = document.createElement("div");
      const pcls = t.priority ? t.priority.toLowerCase() : "p3";
      card.className = "card " + pcls + (t.done ? " done" : "");
      const meta = [];
      const sb = stateBadge(t);
      if (sb) meta.push(sb);
      if (t.priority) meta.push(`<span class="badge ${pcls}">${t.priority}</span>`);
      if (t.id) meta.push(`<span class="id">${escapeHtml(t.id)}</span>`);
      t.tags.forEach(tag => meta.push(`<span class="tag">#${escapeHtml(tag)}</span>`));
      const ttlHtml = t.link
        ? `<a href="${escapeHtml(t.link)}" target="_blank" rel="noopener">${escapeHtml(t.title)}</a>`
        : escapeHtml(t.title);
      card.innerHTML = `<div class="ttl">${ttlHtml}</div>` +
        (meta.length ? `<div class="meta">${meta.join("")}</div>` : "");
      const f = t.link && FILES[stemOf(t.link)];
      if (f && f.ok) {
        card.classList.add("clickable");
        card.onclick = (e) => { if (e.target.closest("a")) return; openDrawer(t); };
      }
      c.appendChild(card);
    });
    board.appendChild(c);
  });
  const content = document.getElementById("content");
  content.innerHTML = "";
  content.appendChild(board);
}

function escapeHtml(s) { return s.replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m])); }

// ---- detail drawer: renders the task file's markdown in-page ----
// Minimal renderer (headings, lists + checkboxes, code fences, bold, inline
// code, links) — task files are house-authored, so this small subset is the
// contract, not a general markdown engine. Input is escaped first.
function inlineMd(s) {
  return s
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>")
    .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (m, t, u) => `<a href="${u}" target="_blank" rel="noopener">${t}</a>`);
}
function mdToHtml(src) {
  const out = [];
  const lines = escapeHtml(src).split(/\r?\n/);
  let inCode = false, inList = false, para = [];
  const flushPara = () => { if (para.length) { out.push("<p>" + inlineMd(para.join(" ")) + "</p>"); para = []; } };
  const closeList = () => { if (inList) { out.push("</ul>"); inList = false; } };
  for (const line of lines) {
    if (/^```/.test(line.trim())) {
      flushPara(); closeList();
      out.push(inCode ? "</code></pre>" : "<pre><code>"); inCode = !inCode; continue;
    }
    if (inCode) { out.push(line); continue; }
    const h = line.match(/^(#{1,4})\s+(.+)$/);
    if (h) { flushPara(); closeList(); const lvl = Math.min(h[1].length + 1, 4); out.push(`<h${lvl}>${inlineMd(h[2])}</h${lvl}>`); continue; }
    const li = line.match(/^\s*[-*]\s+(.+)$/);
    if (li) {
      flushPara(); if (!inList) { out.push("<ul>"); inList = true; }
      let item = li[1];
      const cb = item.match(/^\[([ xX])\]\s*(.*)$/);
      if (cb) item = (/[xX]/.test(cb[1]) ? "☑ " : "☐ ") + cb[2];
      out.push("<li>" + inlineMd(item) + "</li>"); continue;
    }
    if (!line.trim()) { flushPara(); closeList(); continue; }
    para.push(line.trim());
  }
  flushPara(); closeList(); if (inCode) out.push("</code></pre>");
  return out.join("\n");
}

function openDrawer(t) {
  const f = FILES[stemOf(t.link)];
  if (!f || !f.ok) return;
  document.getElementById("dttl").textContent = t.title;
  const meta = [];
  if (f.status) meta.push(`<span class="tag">${escapeHtml(f.status)}</span>`);
  if (f.size) meta.push(`<span class="tag">${escapeHtml(f.size)}</span>`);
  (f.blockedBy || []).forEach(s =>
    meta.push(`<span class="state ${blockerOpen(s) ? "blocked" : "ready"}">⛓ ${escapeHtml(s)}</span>`));
  document.getElementById("dmeta").innerHTML = meta.join("");
  document.getElementById("dbody").innerHTML = mdToHtml(f.body || "");
  document.getElementById("drawer").classList.add("open");
  document.getElementById("overlay").classList.add("open");
}
function closeDrawer() {
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

function load(md, sourceLabel) {
  const parsed = parseTasks(md);
  STATE.columns = parsed.columns;
  STATE.title = parsed.title;
  document.getElementById("updated").textContent =
    (sourceLabel || "Loaded") + " · " + new Date().toLocaleString();
  render();
  fetchTaskFiles().then(render); // enrich with Ready/Blocked + details once files arrive
}

function showNotice() {
  document.getElementById("content").innerHTML =
    `<div class="notice"><b>Couldn't read TASKS.md directly.</b><br>
    Browsers block local file reads over <code>file://</code>. Serve the folder instead:<br><br>
    <code>cd planning &amp;&amp; python3 -m http.server 8000</code><br>
    then open <code>http://localhost:8000/dashboard.html</code>.<br><br>
    Or use <b>Load TASKS.md…</b> above to pick the file manually.</div>`;
  document.getElementById("updated").textContent = "TASKS.md not loaded";
}

async function fetchTasks() {
  try {
    const res = await fetch("TASKS.md", { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    load(await res.text(), "Fetched TASKS.md");
  } catch (e) {
    showNotice();
  }
}

document.getElementById("reload").onclick = fetchTasks;
document.getElementById("dclose").onclick = closeDrawer;
document.getElementById("overlay").onclick = closeDrawer;
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeDrawer(); });
document.getElementById("clearfilters").onclick = () => { STATE.selectedTags.clear(); STATE.search = ""; document.getElementById("search").value = ""; render(); };
document.getElementById("search").oninput = (e) => { STATE.search = e.target.value; render(); };
document.getElementById("pickbtn").onclick = () => document.getElementById("picker").click();
document.getElementById("picker").onchange = (e) => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => load(r.result, "Loaded " + f.name);
  r.readAsText(f);
};

fetchTasks();
</script>
</body>
</html>
