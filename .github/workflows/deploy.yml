name: Deploy codex to GitHub Pages

# Publishes planning/brightwell-codex.html (baked + toy-bundled) as a static site.
on:
  push:
    branches: [main]        # deploy on every push to main
  workflow_dispatch: {}     # …or run manually from the Actions tab (any branch)

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; a newer push cancels an in-flight run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: npm ci
      - run: npm run build:site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
